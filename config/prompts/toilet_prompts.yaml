# Two-prompt fusion config for "toilet"
# SR (id=0): target-direct, drives ObjectMap confidence
# IG (id=1): exploration-oriented, drives broad coverage

target_object: "toilet"

prompts:
  - id: 0
    type: "semantic_relevance"
    text: "a toilet in the bathroom with sink and shower, white porcelain toilet bowl with tank, bathroom interior with fixtures"
    hypothesis: "Direct visual evidence of target object in its typical room"
    initial_weight: 0.5

  - id: 1
    type: "information_gain"
    text: "open corridor with multiple doorways leading to unexplored rooms, hallway junction with several closed doors, unvisited room entrances"
    hypothesis: "High-connectivity passages typically yield large coverage gain"
    initial_weight: 0.5

object_map_prompt_id: 0
