# Two-prompt fusion config for "bed"
# SR (id=0): target-direct, drives ObjectMap confidence
# IG (id=1): exploration-oriented, drives broad coverage

target_object: "bed"

prompts:
  - id: 0
    type: "semantic_relevance"
    text: "bed with pillows and blanket in bedroom, mattress with bedding, sleeping area with nightstand and bedroom furniture"
    hypothesis: "Beds are always in bedrooms with typical bedroom furniture"
    initial_weight: 0.5

  - id: 1
    type: "information_gain"
    text: "open corridor with multiple doorways leading to unexplored rooms, hallway with several closed doors, unvisited room entrances"
    hypothesis: "High-connectivity passages typically yield large coverage gain"
    initial_weight: 0.5

object_map_prompt_id: 0
