  - id: 1
    type: "information_gain"
    text: "open corridor with multiple doorways leading to unexplored rooms, hallway junction with several doors, unvisited room entrances"
    hypothesis: "High-connectivity passages typically yield large coverage gain"
    initial_weight: 0.5

object_map_prompt_id: 0
