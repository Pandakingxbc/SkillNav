# Two-prompt fusion config for "chair"
# SR (id=0): target-direct, drives ObjectMap confidence
# IG (id=1): exploration-oriented, drives broad coverage

target_object: "chair"

prompts:
  - id: 0
    type: "semantic_relevance"
    text: "dining chair around wooden table in kitchen, chairs with dining table in eating area, seating furniture in dining room"
    hypothesis: "Chairs most commonly found near dining tables in kitchen/dining areas"
    initial_weight: 0.5

  - id: 1
    type: "information_gain"
    text: "open corridor with multiple doorways leading to unexplored rooms, hallway junction with several doors, unvisited room entrances"
    hypothesis: "High-connectivity passages typically yield large coverage gain"
    initial_weight: 0.5

object_map_prompt_id: 0
